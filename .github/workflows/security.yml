name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-history:
    name: Full Git history secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout complete history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download checksum-pinned Gitleaks
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            --output /tmp/gitleaks.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz" \
            | sha256sum --check --strict
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks

      - name: Scan all commits without printing detected values
        id: gitleaks
        continue-on-error: true
        run: /tmp/gitleaks git --redact --no-banner --report-format json --report-path gitleaks-report.json

      - name: Create finding index
        if: always()
        run: |
          if [ -f gitleaks-report.json ]; then
            jq '[.[] | {RuleID, Description, File, StartLine, EndLine, Commit}]' gitleaks-report.json > gitleaks-index.json
          else
            echo '[]' > gitleaks-index.json
          fi

      - name: Upload finding index
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-index-${{ github.sha }}
          path: gitleaks-index.json
          retention-days: 7

      - name: Enforce clean history
        if: steps.gitleaks.outcome == 'failure'
        run: exit 1

  codeql:
    name: CodeQL
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  production-audit:
    name: Production dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
