packages:
  - "apps/*"
  - "packages/*"

onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd
  - protobufjs
  - "@firebase/util"

peerDependencyRules:
  allowedVersions:
    react: "19"
    date-fns: "3 || 4"
    tailwindcss: "4"
    typescript: "5 || 6"
  ignoreMissing:
    - react-is

overrides:
  react: "^19.2.7"
  react-dom: "^19.2.7"
  react-is: "^19.2.7"
  picomatch: ">=2.3.2"
  yaml: ">=2.8.3"
  dompurify: ">=3.4.11"
  postcss: ">=8.5.10"
  jws: "^3.2.3"
  esbuild: "0.28.1"
  mdast-util-to-hast: "^13.2.1"
  markdown-it: ">=14.1.1"
  devalue: "5.8.1"
  h3: ">=1.15.9"
  diff: ">=5.2.2"
  lodash: ">=4.17.23"
  undici: ">=8.5.0"
  wrangler: "4.100.0"
  partyserver: "0.5.6"
  better-call: "1.3.6"
  "@daveyplate/better-auth-ui>better-call": "1.3.6"
  shell-quote: "1.8.4"
  "@grpc/grpc-js": "1.14.4"
  ws: "8.21.0"
  qs: "6.15.2"
  js-yaml: "4.2.0"

allowBuilds:
  '@firebase/util': true
  '@mongodb-js/zstd': false
  core-js: false
  core-js-pure: false
  esbuild: true
  node-liblzma: false
  protobufjs: true
  sharp: true
  workerd: true

minimumReleaseAgeExclude:
  - '@ai-sdk/gateway@3.0.131'
  - ai@6.0.205
